seed: 42

data:
  players_csv: data/elo_base_players_understat_with_attacker_ranks.csv
  fixtures_csv: data/elo_base_fixtures.csv
  processed_csv: data/tat_player_features.csv
  split_csv: data/tat_player_features_with_splits.csv
  feature_config_yaml: data/tat_feature_config.yaml
  scaler_joblib: data/tat_scaler.joblib

features:
  min_minutes_required: 1.0
  min_minutes_for_per90: 30.0
  # Core stats with strong coverage.
  base_numeric:
    - minutes_played_resolved
    - goals
    - own_goal
    - age
    - log_marketvalue
  # Understat event stats are sparse (~40% missing), keep explicit missing indicators.
  understat_numeric:
    - understat_xg
    - understat_xa
    - understat_xg90
    - understat_xa90
    - understat_npxg
    - understat_xgchain
    - understat_xgbuildup
    - understat_shots
    - understat_key_passes
    - understat_goals
    - understat_assists
  fixture_context_numeric:
    - team_goals
    - opp_goals
    - team_shots
    - opp_shots
    - team_shots_on_target
    - opp_shots_on_target
    - team_possession
    - opp_possession
  add_missing_indicators_for:
    - understat_xg
    - understat_xa
    - understat_npxg
    - understat_xgchain
    - understat_xgbuildup
    - understat_shots
    - understat_key_passes
    - understat_goals
    - understat_assists
    - log_marketvalue

sequence:
  window_size: 25
  # Use history up to t-1 so embeddings are usable pre-match.
  cutoff_shift: -1

model:
  d_model: 384
  d_z: 256
  n_heads: 8
  n_layers: 6
  dropout: 0.1
  use_position_embedding: false
  use_team_embeddings: false
  causal_attention: true

train:
  epochs: 20
  batch_size: 128
  lr: 0.0001
  weight_decay: 0.01
  grad_clip: 1.0
  amp: true
  num_workers: 0
  warmup_ratio: 0.05
  lambda_contrastive: 0.1
  contrastive_warmup_epochs: 2
  tau: 0.07
  contrastive_cross_role_weight: 1.0
  contrastive_in_role_weight: 0.75
  p_feature_mask: 0.25
  p_match_mask: 0.10
  noise_sigma: 0.02

output:
  model_dir: artifacts/tat
  model_file: model.pt
